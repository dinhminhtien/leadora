name: leadora_mobile
description: "Leadora CRM mobile app — enterprise feature-first Flutter client."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management — Riverpod (hand-written providers, no codegen)
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0
  dio_cache_interceptor: ^3.5.0
  dio_smart_retry: ^7.0.0

  # Local storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5

  # Auth / security
  supabase_flutter: ^2.8.3
  google_sign_in: ^6.2.1

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Typography — brand font (Inter). Falls back to the platform font offline.
  google_fonts: ^6.2.1

  # Logging
  logger: ^2.5.0

  # i18n
  intl: any

  # Utility
  url_launcher: ^6.3.1         # tel:/mailto: quick actions on detail screens
  mutex: ^3.1.0                # refresh-token mutex lock
  skeletonizer: ^2.1.0         # skeleton loading states (2.x required on Flutter ≥3.35)

  # Native splash generator + runtime plugin. Must live in `dependencies`
  # (per its docs): as a dev_dependency its Android plugin class is excluded
  # from the release Gradle classpath while GeneratedPluginRegistrant still
  # references it, which fails `flutter build apk --release`.
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Testing
  mocktail: ^1.0.4

  # Production branding — launcher icon generator (pure build tool, no
  # native plugin, so dev-only is correct here). Run: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.3
  image: ^4.8.0                # used by tool/gen_dark_splash.dart

flutter:
  uses-material-design: true
  generate: true              # enable gen-l10n from lib/core/localization/*.arb

  assets:
    - assets/images/logo.png  # official brand mark, copied from frontend/public/logo1.jpg
    # NOTE: assets/branding/* are build-time sources for flutter_launcher_icons /
    # flutter_native_splash only — intentionally NOT bundled into the APK.

# ── Launcher icons ────────────────────────────────────────────────────────────
# Generates every Android mipmap density + adaptive icon (foreground/background/
# monochrome) from the branding sources. Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  # Legacy square/round mipmaps (pre-Android 8) — logo padded on white.
  image_path: "assets/branding/ic_launcher.png"
  # Android 8+ adaptive icon: colorful logo foreground on a white brand surface
  # so the blue→green mark stays legible on Pixel/Samsung/Xiaomi/Oppo/Vivo masks.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/branding/ic_foreground.png"
  # Android 13+ themed (monochrome) icon — white silhouette, system-tinted.
  adaptive_icon_monochrome: "assets/branding/ic_monochrome.png"
  # Remove the default Flutter icon's alpha-channel warning path on older tools.
  remove_alpha_ios: false

# ── Native splash ─────────────────────────────────────────────────────────────
# OS-level launch screen shown before the Flutter engine draws its first frame.
# Matches the in-app SplashScreen (logo centered on brand surface). Two color
# states mirror the web logo treatment (`mix-blend-multiply dark:invert`):
# original mark on white in light, inverted mark on #0B1220 in dark — the dark
# asset is generated by `dart run tool/gen_dark_splash.dart`.
# Run: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#0B1220"
  image: "assets/branding/splash_logo.png"
  image_dark: "assets/branding/splash_logo_dark.png"
  android_12:
    image: "assets/branding/splash_logo.png"
    image_dark: "assets/branding/splash_logo_dark.png"
    color: "#FFFFFF"
    color_dark: "#0B1220"
    icon_background_color: "#FFFFFF"
    icon_background_color_dark: "#0B1220"
  android: true
  ios: false
  web: false
