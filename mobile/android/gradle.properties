org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Kotlin incremental compilation breaks when a plugin's sources sit in the Pub
# cache on C:\ while this project is on D:\ — the incremental cache can't
# relativize paths across different Windows drive roots ("different roots").
# Disabling it sidesteps the crash at a small clean-build cost.
kotlin.incremental=false
