server:
  port: ${PORT:8085}

spring:
  application:
    name: leadora

  main:
    allow-bean-definition-overriding: true

  # Company-document uploads for the RAG knowledge base can exceed the 1MB default.
  servlet:
    multipart:
      max-file-size: ${AI_MAX_UPLOAD_SIZE:20MB}
      max-request-size: ${AI_MAX_UPLOAD_SIZE:20MB}

  # Spring AI starters are on the classpath but not yet configured (the `ai:`
  # block below is commented out). Their auto-configurations fail fast on missing
  # credentials / unavailable services, so exclude them while AI is disabled.
  # Remove the relevant entry when you enable that integration.
  # AI chat assistant (feature/ai_internal): chat + embeddings BOTH via Google Gemini API (no local AI).
  # Provider is selected with spring.ai.model.chat / spring.ai.model.embedding below, so the
  # Ollama and Anthropic auto-configs back off cleanly (no Ollama needs to run). Only non-model
  # integrations we don't use are excluded here (JDBC chat-memory, Elasticsearch, Redis vector stores).
  autoconfigure:
    exclude:
      - org.springframework.ai.model.chat.memory.repository.jdbc.autoconfigure.JdbcChatMemoryRepositoryAutoConfiguration
      - org.springframework.ai.vectorstore.elasticsearch.autoconfigure.ElasticsearchVectorStoreAutoConfiguration
      - org.springframework.ai.vectorstore.redis.autoconfigure.RedisVectorStoreAutoConfiguration

  docker:
    compose:
      enabled: false

  # Single shared .env lives at the repo root (leadora/.env). Run the backend from
  # leadora/backend/ so ../.env resolves to it. optional: missing file → use defaults below.
  config:
    import:
      - optional:file:../.env[.properties]

  # Database configuration (Supabase PostgreSQL / local PostgreSQL)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mydatabase}
    username: ${SPRING_DATASOURCE_USERNAME:myuser}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
        # pgbouncer compatibility — must explicitly set dialect when disabling JDBC metadata access
        boot:
          allow_jdbc_metadata_access: false

  # # Redis Configuration for caching and HTTP session management
  # data:
  #   redis:
  #     host: ${REDIS_HOST:localhost}
  #     port: ${REDIS_PORT:6379}
  #     password: ${REDIS_PASSWORD:}

  # session:
  #   store-type: redis

  # Spring Security / JWT configuration:
  # JWT validation is handled by the custom HS256 JwtDecoder bean in WebSecurityConfig.
  # Do NOT add spring.security.oauth2.resourceserver.jwt here — Supabase uses HS256 (symmetric),
  # not RS256 (asymmetric JWK), so the default Spring auto-configuration does not apply.


  # Spring AI configuration — Internal Sales Chat Assistant (feature/ai_internal)
  # Runtime: Google Gemini API for BOTH chat and embeddings (no local AI) + pgvector store for RAG.
  ai:
    # Select Gemini as the active provider so Ollama/Anthropic auto-configs back off.
    model:
      chat: google-genai
      embedding: google-genai
    google:
      genai:
        # Gemini Developer API: just an API key (no project-id/location → not Vertex).
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            # Cheap + fast, good for CRM Q&A. Other options: gemini-2.5-flash-lite, gemini-2.5-pro.
            model: ${GEMINI_CHAT_MODEL:gemini-2.5-flash}
            temperature: ${GEMINI_CHAT_TEMPERATURE:0.2}
        embedding:
          text:
            options:
              model: ${GEMINI_EMBEDDING_MODEL:text-embedding-004}   # 768 dimensions
    vectorstore:
      pgvector:
        # Creates the `vector` extension, the table and an HNSW index on first run.
        initialize-schema: ${AI_VECTORSTORE_INIT_SCHEMA:true}
        table-name: leadora_vector_store
        schema-name: public
        dimensions: ${AI_EMBEDDING_DIMENSIONS:768}   # text-embedding-004 → 768
        index-type: HNSW
        distance-type: COSINE_DISTANCE

logging:
  level:
    org.springframework.security: DEBUG

