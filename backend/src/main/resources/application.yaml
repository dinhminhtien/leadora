server:
  port: ${PORT:8085}
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
    min-response-size: 2048

spring:
  application:
    name: leadora

  main:
    allow-bean-definition-overriding: true

  # Company-document uploads for the RAG knowledge base can exceed the 1MB default.
  servlet:
    multipart:
      max-file-size: ${AI_MAX_UPLOAD_SIZE:20MB}
      max-request-size: ${AI_MAX_UPLOAD_SIZE:20MB}

  # AI chat assistant (feature/ai_internal): chat + embeddings BOTH via Google Gemini API (no local AI).
  docker:
    compose:
      enabled: false

  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

  # Database configuration (Supabase PostgreSQL / local PostgreSQL)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mydatabase}
    username: ${SPRING_DATASOURCE_USERNAME:myuser}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAX_POOL_SIZE:5}
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
        # pgbouncer compatibility — must explicitly set dialect when disabling JDBC metadata access
        boot:
          allow_jdbc_metadata_access: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:${SPRING_MAIL_USERNAME:leadora.novax@gmail.com}}
    password: ${MAIL_PASSWORD:${SPRING_MAIL_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  cache:
    type: ${SPRING_CACHE_TYPE:simple}
    redis:
      time-to-live: 3600000 # 1 hour
      cache-null-values: false

  # Spring Security / JWT configuration:
  # JWT validation is handled by the custom HS256 JwtDecoder bean in WebSecurityConfig.
  # Do NOT add spring.security.oauth2.resourceserver.jwt here — Supabase uses HS256 (symmetric),
  # not RS256 (asymmetric JWK), so the default Spring auto-configuration does not apply.


  # Spring AI configuration — Internal Sales Chat Assistant (feature/ai_internal)
  # Runtime: Google Gemini API for BOTH chat and embeddings (no local AI) + pgvector store for RAG.
  ai:
    # Fail-fast retry. Spring AI's default retries a 429 up to 10 times with exponential backoff
    # (2s → ×5 → up to 3 min), so on a quota/rate-limit error the chat/embedding call would HANG
    # for tens of seconds before surfacing the error ("chat is slower than usual"). On the Gemini
    # free tier (20 chat req/day, 1000 embed req/day) a 429 is usually a hard daily cap, not a blip,
    # so retrying long is pointless — fail after at most one short retry and let the app show a clear
    # "out of quota" message immediately. Raise these once billing/paid quota is enabled.
    retry:
      max-attempts: ${AI_RETRY_MAX_ATTEMPTS:2}
      backoff:
        initial-interval: 800ms
        multiplier: 2
        max-interval: 3s
    # Select Gemini as the active provider so Ollama/Anthropic auto-configs back off.
    model:
      chat: google-genai
      embedding: google-genai
    google:
      genai:
        vertex-ai: ${GEMINI_USE_VERTEX:true}
        # Vertex AI mode: Uses project-id + location. If api-key is set, it defaults to Gemini Developer API (AI Studio).
        # We keep api-key optional (EMPTY default) to allow falling back to Vertex AI with GCP credentials (ADC / Service Account).
        # NOTE: the default must be empty (`:}`), NOT `#{null}`. In @ConfigurationProperties binding Spring
        # does NOT evaluate SpEL, so `#{null}` binds as the literal 6-char string "#{null}" — a non-blank
        # api-key that the auto-config reports as "API Key detected". The chat connection survives that only
        # because `vertex-ai: true` above makes it ignore the key; the embedding connection has no such toggle.
        api-key: ${GOOGLE_GENAI_API_KEY:${GEMINI_API_KEY:}}
        project-id: ${GEMINI_PROJECT_ID:mock-project-id}
        location: ${GEMINI_LOCATION:asia-southeast1}
        chat:
          options:
            # Cheap + fast, good for CRM Q&A. Other options: gemini-2.5-flash-lite, gemini-2.5-pro.
            model: ${GEMINI_CHAT_MODEL:gemini-2.5-flash}
            temperature: ${GEMINI_CHAT_TEMPERATURE:0.2}
            # Latency control: 0 disables the model's "thinking" tokens (big speed win on Gemini 2.5).
            # NOTE: Gemini 3.x (e.g. gemini-3.5-flash) may IGNORE this — it uses thinkingLevel (3-Pro only),
            # so on 3.x the reliable speed lever is the model: set GEMINI_CHAT_MODEL=gemini-2.5-flash.
            thinking-budget: ${GEMINI_THINKING_BUDGET:0}
        embedding:
          # IMPORTANT: the Google GenAI *embedding* connection has NO working `vertex-ai` boolean
          # (unlike the chat block). Its mode is inferred purely from the properties present:
          #   - api-key set            → Gemini Developer API (AI Studio)
          #   - project-id + location  → Vertex AI
          # So in Vertex mode the api-key must resolve to a BLANK string (hasText == false). The default
          # here is `:}` (empty), NOT `#{null}`: a `#{null}` default binds as the literal string "#{null}"
          # (SpEL is not evaluated for @ConfigurationProperties), which is a non-blank api-key and flips
          # this client to the Developer API → "API key not valid" on every upload (the upload/RAG bug).
          # To run embeddings on the Developer API instead, set GEMINI_USE_VERTEX=false AND export a real
          # GEMINI_API_KEY (or GOOGLE_GENAI_API_KEY) — it then resolves here to that non-blank key.
          api-key: ${GOOGLE_GENAI_API_KEY:${GEMINI_API_KEY:}}
          project-id: ${GEMINI_PROJECT_ID:mock-project-id}
          location: ${GEMINI_LOCATION:asia-southeast1}
          text:
            options:
              # This API key serves gemini-embedding-001 (text-embedding-004 → 404 here).
              # gemini-embedding-001 defaults to 3072 dims; pin to 768 (outputDimensionality)
              # to match the pgvector table below.
              model: ${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}
              dimensions: ${AI_EMBEDDING_DIMENSIONS:768}
    vectorstore:
      pgvector:
        # Creates the `vector` extension, the table and an HNSW index on first run.
        initialize-schema: ${AI_VECTORSTORE_INIT_SCHEMA:true}
        table-name: leadora_vector_store
        schema-name: public
        dimensions: ${AI_EMBEDDING_DIMENSIONS:768}   # text-embedding-004 → 768
        index-type: HNSW
        distance-type: COSINE_DISTANCE

logging:
  level:
    org.springframework.security: DEBUG

# RAG ingestion tuning (custom namespace read by SemanticChunker).
# semantic-chunking embeds EVERY sentence of a document to find topic boundaries — on top of the
# per-chunk embeddings the vector store already does — so one medium file can fire hundreds of
# embedding calls and exhaust the Gemini free-tier embedding quota (1000/day) in a single upload.
# Default OFF: fall back to token splitting, which embeds only the final chunks (O(chunks), not
# O(sentences)) — 10–30× fewer calls, faster ingest, uploads that actually finish. Turn it back on
# (AI_SEMANTIC_CHUNKING=true) once you have paid/embedding quota and want the retrieval-quality gain.
ai:
  rag:
    semantic-chunking:
      # ON by default now that Vertex AI (billed) has real embedding quota — semantic chunking
      # embeds each sentence to find topic boundaries (better retrieval quality) but costs more
      # embedding calls. Set AI_SEMANTIC_CHUNKING=false to fall back to cheap token splitting.
      enabled: ${AI_SEMANTIC_CHUNKING:true}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  bank:
    account-number: ${APP_BANK_ACCOUNT_NUMBER:123456789}
    provider: ${APP_BANK_PROVIDER:sepay}
    api-token: ${APP_BANK_API_TOKEN:dummy-token}
    api-url: ${APP_BANK_API_URL:https://my.sepay.vn/plus/api/transactions}

# Supabase environment fallbacks (prevents startup crash if environment variables are not set)
SUPABASE_URL: ${SUPABASE_URL}
SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}


