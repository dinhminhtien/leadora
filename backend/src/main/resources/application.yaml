server:
  port: ${PORT:8085}

spring:
  application:
    name: leadora

  main:
    allow-bean-definition-overriding: true

  # Spring AI starters are on the classpath but not yet configured (the `ai:`
  # block below is commented out). Their auto-configurations fail fast on missing
  # credentials / unavailable services, so exclude them while AI is disabled.
  # Remove the relevant entry when you enable that integration.
  autoconfigure:
    exclude:
      - org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiTextEmbeddingAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaApiAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
      - org.springframework.ai.model.chat.memory.repository.jdbc.autoconfigure.JdbcChatMemoryRepositoryAutoConfiguration
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
      - org.springframework.ai.vectorstore.elasticsearch.autoconfigure.ElasticsearchVectorStoreAutoConfiguration
      - org.springframework.ai.vectorstore.redis.autoconfigure.RedisVectorStoreAutoConfiguration

  docker:
    compose:
      enabled: false

  # Import environment variables from the root .env file if present
  config:
    import:
      - optional:file:../.env[.properties]

  # Database configuration (Supabase PostgreSQL / local PostgreSQL)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mydatabase}
    username: ${SPRING_DATASOURCE_USERNAME:myuser}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
        # pgbouncer compatibility — must explicitly set dialect when disabling JDBC metadata access
        boot:
          allow_jdbc_metadata_access: false

  # # Redis Configuration for caching and HTTP session management
  # data:
  #   redis:
  #     host: ${REDIS_HOST:localhost}
  #     port: ${REDIS_PORT:6379}
  #     password: ${REDIS_PASSWORD:}

  # session:
  #   store-type: redis

  # Spring Security / JWT configuration:
  # JWT validation is handled by the custom HS256 JwtDecoder bean in WebSecurityConfig.
  # Do NOT add spring.security.oauth2.resourceserver.jwt here — Supabase uses HS256 (symmetric),
  # not RS256 (asymmetric JWK), so the default Spring auto-configuration does not apply.


