spring:
  application:
    name: leadora

  # Import environment variables from the root .env file if present
  config:
    import:
      - optional:file:../.env[.properties]

  # Database configuration (Supabase PostgreSQL / local PostgreSQL)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mydatabase}
    username: ${SPRING_DATASOURCE_USERNAME:myuser}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  # Redis Configuration for caching and HTTP session management
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  session:
    store-type: redis

  # Spring Security / JWT configuration (for verifying Supabase JWTs)
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SUPABASE_URL}/auth/v1/certs
          issuer-uri: ${SUPABASE_URL}/auth/v1

  # Spring AI configuration
  ai:
    google:
      genai:
        api-key: ${GOOGLE_GENAI_API_KEY:}
        chat:
          options:
            model: gemini-1.5-flash
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:qwen}
    vectorstore:
      pgvector:
        database-name: ${SPRING_DATASOURCE_USERNAME:postgres}
        table-name: leadora_vector_store
        dimensions: 1536
